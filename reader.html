<!DOCTYPE html>
<meta charset="utf-8">
<meta name="color-scheme" content="light dark">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' blob:; script-src 'self'; style-src 'self' blob: 'unsafe-inline'; img-src 'self' blob: data:; connect-src 'self' blob: data: *; frame-src blob: data:; object-src blob: data:; form-action 'none';">
<title>E-Book Reader</title>
<link rel="stylesheet" href="bookclub.css">
<style>
:root {
    --active-bg: rgba(0, 0, 0, .05);
}
@supports (color-scheme: light dark) {
    @media (prefers-color-scheme: dark) {
        :root {
            --active-bg: rgba(255, 255, 255, .1);
        }
    }
}
html {
    height: 100%;
}
body {
    margin: 0 auto;
    height: 100%;
    font: menu;
    font-family: system-ui, sans-serif;
}
#drop-target {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    visibility: hidden;
}
#drop-target h1 {
    font-weight: 900;
    margin-bottom: 4px;
}
.drop-target-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    max-width: 380px;
    width: 100%;
    padding: 0 24px;
    box-sizing: border-box;
}
.drop-target-divider {
    display: flex;
    align-items: center;
    width: 100%;
    margin: 20px 0 16px;
    color: GrayText;
    font-size: 0.85rem;
    gap: 10px;
}
.drop-target-divider::before,
.drop-target-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(128, 128, 128, 0.3);
}
.drop-target-join {
    display: flex;
    width: 100%;
    gap: 8px;
}
.drop-target-join input {
    flex: 1;
    padding: 10px 12px;
    font-family: inherit;
    font-size: 0.9rem;
    border: 1px solid rgba(128, 128, 128, 0.4);
    border-radius: 8px;
    background: Canvas;
    color: CanvasText;
    outline: none;
    transition: border-color 0.2s ease;
}
.drop-target-join input:focus {
    border-color: CanvasText;
}
.drop-target-join button {
    padding: 0;
    width: 42px;
    height: 42px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: inherit;
    background: CanvasText;
    color: Canvas;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: opacity 0.2s ease;
}
.drop-target-join button:hover {
    opacity: 0.75;
}
#file-button {
    font: inherit;
    background: none;
    border: 0;
    padding: 0;
    text-decoration: underline;
    cursor: pointer;
}
.icon {
    display: block;
    fill: none;
    stroke: currentcolor;
    stroke-width: 2px;
}
.empty-state-icon {
    margin: auto;
}
.toolbar {
    box-sizing: border-box;
    position: absolute;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    height: 48px;
    padding: 6px;
    transition: opacity 250ms ease;
    visibility: hidden;
}
.toolbar button {
    padding: 3px;
    border-radius: 6px;
    background: none;
    border: 0;
    color: GrayText;
}
.toolbar button:hover {
    background: rgba(0, 0, 0, .1);
    color: currentcolor;
}
#header-bar {
    top: 0;
}
#nav-bar {
    bottom: 0;
}
#bc-progress-track {
    flex-grow: 1;
    margin: 0 12px;
    position: relative;
    display: flex;
    align-items: center;
}
#progress-slider {
    width: 100%;
    visibility: hidden;
}
#side-bar {
    visibility: hidden;
    box-sizing: border-box;
    position: absolute;
    z-index: 2;
    top: 0;
    left: 0;
    height: 100%;
    width: 320px;
    transform: translateX(-320px);
    display: flex;
    flex-direction: column;
    background: Canvas;
    color: CanvasText;
    box-shadow: 0 0 0 1px rgba(0, 0, 0, .2), 0 0 40px rgba(0, 0, 0, .2);
    transition: visibility 0s linear 300ms, transform 300ms ease;
}
#side-bar.show {
    visibility: visible;
    transform: translateX(0);
    transition-delay: 0s;
}
#dimming-overlay {
    visibility: hidden;
    position: fixed;
    z-index: 2;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, .2);
    opacity: 0;
    transition: visibility 0s linear 300ms, opacity 300ms ease;
}
#dimming-overlay.show {
    visibility: visible;
    opacity: 1;
    transition-delay: 0s;
}
#side-bar-header {
    padding: 1rem;
    display: flex;
    border-bottom: 1px solid rgba(0, 0, 0, .1);
    align-items: center;
}
#side-bar-cover {
    height: 10vh;
    min-height: 60px;
    max-height: 180px;
    border-radius: 3px;
    border: 0;
    background: lightgray;
    box-shadow: 0 0 1px rgba(0, 0, 0, .1), 0 0 16px rgba(0, 0, 0, .1);
    margin-inline-end: 1rem;
}
#side-bar-cover:not([src]) {
    display: none;
}
#side-bar-title {
    margin: .5rem 0;
    font-size: inherit;
}
#side-bar-author {
    margin: .5rem 0;
    font-size: small;
    color: GrayText;
}
#toc-view {
    padding: .5rem;
    overflow-y: scroll;
}
#toc-view li, #toc-view ol {
    margin: 0;
    padding: 0;
    list-style: none;
}
#toc-view a, #toc-view span {
    display: block;
    border-radius: 6px;
    padding: 8px;
    margin: 2px 0;
}
#toc-view a {
    color: CanvasText;
    text-decoration: none;
}
#toc-view a:hover {
    background: var(--active-bg);
}
#toc-view span {
    color: GrayText;
}
#toc-view svg {
    margin-inline-start: -24px;
    padding-inline-start: 5px;
    padding-inline-end: 6px;
    fill: CanvasText;
    cursor: default;
    transition: transform .2s ease;
    opacity: .5;
}
#toc-view svg:hover {
    opacity: 1;
}
#toc-view [aria-current] {
    font-weight: bold;
    background: var(--active-bg);
}
#toc-view [aria-expanded="false"] svg {
    transform: rotate(-90deg);
}
#toc-view [aria-expanded="false"] + [role="group"] {
    display: none;
}
.menu-container {
    position: relative;
}
.menu, .menu ul {
    list-style: none;
    padding: 0;
    margin: 0;
}
.menu {
    visibility: hidden;
    position: absolute;
    right: 0;
    background: Canvas;
    color: CanvasText;
    border-radius: 6px;
    box-shadow: 0 0 0 1px rgba(0, 0, 0, .2), 0 0 16px rgba(0, 0, 0, .1);
    padding: 6px;
    cursor: default;
}
.menu.show {
    visibility: visible;
}
.menu li {
    padding: 6px 12px;
    padding-left: 24px;
    border-radius: 6px;
}
.menu li:hover {
    background: var(--active-bg);
}
.menu li[aria-checked="true"] {
    background-position: center left;
    background-repeat: no-repeat;
    background-image: url('data:image/svg+xml;utf8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2224%22%20height%3D%2224%22%3E%3Ccircle%20cx%3D%2212%22%20cy%3D%2212%22%20r%3D%223%22%2F%3E%3C%2Fsvg%3E');
}
.popover {
    background: Canvas;
    color: CanvasText;
    border-radius: 6px;
    box-shadow: 0 0 0 1px rgba(0, 0, 0, .2), 0 0 16px rgba(0, 0, 0, .1), 0 0 32px rgba(0, 0, 0, .1);
}
.popover-arrow-down {
    fill: Canvas;
    filter: drop-shadow(0 -1px 0 rgba(0, 0, 0, .2));
}
.popover-arrow-up {
    fill: Canvas;
    filter: drop-shadow(0 1px 0 rgba(0, 0, 0, .2));
}
</style>
<input type="file" id="file-input" hidden>
<div id="drop-target" class="filter">
    <div class="drop-target-inner">
        <svg class="icon empty-state-icon" width="72" height="72" aria-hidden="true">
            <path d="M36 18s-6-6-12-6-15 6-15 6v42s9-6 15-6 12 6 12 6c4-4 8-6 12-6s12 2 15 6V18c-6-4-12-6-15-6-4 0-8 2-12 6m0 0v42"/>
        </svg>
        <h1>Drop a book here!</h1>
        <p>Or <button id="file-button">choose a file</button> to open it.</p>

        <div class="drop-target-divider">
            <span>or join an existing room</span>
        </div>

        <div class="drop-target-join">
            <input type="text" id="drop-join-input" placeholder="Room code (e.g. a1b2c3d4e)">
            <button id="drop-join-btn" aria-label="Join room">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 12h14M13 6l6 6-6 6"/>
                </svg>
            </button>
        </div>
    </div>
</div>
<div id="dimming-overlay" aria-hidden="true"></div>
<div id="side-bar">
    <div id="side-bar-header">
        <img id="side-bar-cover">
        <div>
            <h1 id="side-bar-title"></h1>
            <p id="side-bar-author"></p>
        </div>
    </div>
    <div class="sidebar-tabs">
        <button id="tab-toc" class="tab-btn active">Table of Contents</button>
        <button id="tab-bookclub" class="tab-btn">Book Club</button>
    </div>
    <div id="toc-view" class="tab-content active"></div>
    <div id="bookclub-view" class="tab-content">
        <!-- If not in a room, show creation / join panel -->
        <div id="bc-setup-panel">
            <h3>Start a Book Club</h3>
            <p>Share your reading with friends in real time.</p>
            <button id="bc-create-room-btn" class="bc-btn bc-btn-primary">Create Room with Current Book</button>
            <div class="bc-divider"><span>OR</span></div>
            <h3>Join a Room</h3>
            <div class="bc-join-form">
                <input type="text" id="bc-join-id-input" placeholder="Room code (e.g. a1b2c3d4)">
                <button id="bc-join-room-btn" class="bc-btn">Join</button>
            </div>
        </div>
        <!-- If in a room, show the active room state -->
        <div id="bc-room-panel" style="display: none;">
            <div class="bc-info-card">
                <div class="bc-room-badge">Active Room</div>
                <div class="bc-room-id-container">
                    <span id="bc-room-id-val"></span>
                    <button id="bc-copy-link-btn" title="Copy Invite Link">
                        <svg class="icon" width="16" height="16" aria-hidden="true" style="stroke-width: 2px;">
                            <path d="M8 4v8M4 8h8"/>
                        </svg>
                        Copy Invite
                    </button>
                </div>
            </div>
            
            <div id="bc-identity-section" class="bc-card">
                <label for="bc-nick-input">Nickname:</label>
                <div class="bc-input-group">
                    <input type="text" id="bc-nick-input" placeholder="What should we call you?">
                    <button id="bc-save-nick-btn" class="bc-btn bc-btn-sm">Save</button>
                </div>
                <div class="bc-color-picker-row">
                    <label for="bc-color-input">Your Color:</label>
                    <div class="bc-color-presets" id="bc-color-presets"></div>
                    <input type="color" id="bc-color-input" title="Custom color">
                </div>
            </div>

            <div class="bc-section-title">Readers (<span id="bc-member-count">0</span>)</div>
            <div id="bc-members-list" class="bc-members-list"></div>


        </div>
    </div>
</div>
<div id="header-bar" class="toolbar">
    <button id="side-bar-button" aria-label="Show sidebar">
        <svg class="icon" width="24" height="24" aria-hidden="true">
            <path d="M 4 6 h 16 M 4 12 h 16 M 4 18 h 16"/>
        </svg>
    </button>
    <div id="menu-button" class="menu-container">
        <button aria-label="Show settings" aria-haspopup="true">
            <svg class="icon" width="24" height="24" aria-hidden="true">
                <path d="M5 12.7a7 7 0 0 1 0-1.4l-1.8-2 2-3.5 2.7.5a7 7 0 0 1 1.2-.7L10 3h4l.9 2.6 1.2.7 2.7-.5 2 3.4-1.8 2a7 7 0 0 1 0 1.5l1.8 2-2 3.5-2.7-.5a7 7 0 0 1-1.2.7L14 21h-4l-.9-2.6a7 7 0 0 1-1.2-.7l-2.7.5-2-3.4 1.8-2Z"/>
                <circle cx="12" cy="12" r="3"/>
            </svg>
        </button>
    </div>
</div>
<div id="nav-bar" class="toolbar">
    <button id="left-button" aria-label="Go left">
        <svg class="icon" width="24" height="24" aria-hidden="true">
            <path d="M 15 6 L 9 12 L 15 18"/>
        </svg>
    </button>
    <div id="bc-progress-track">
        <input id="progress-slider" type="range" min="0" max="1" step="any" list="tick-marks">
        <datalist id="tick-marks"></datalist>
        <div id="bc-progress-markers"></div>
    </div>
    <button id="right-button" aria-label="Go right">
        <svg class="icon" width="24" height="24" aria-hidden="true">
            <path d="M 9 6 L 15 12 L 9 18"/>
        </svg>
    </button>
</div>
<script src="reader.js" type="module"></script>
<script src="bookclub.js" type="module"></script>
