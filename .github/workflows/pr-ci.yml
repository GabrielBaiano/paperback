name: Pull Request & CI Quality Pipeline

on:
  push:
    branches: [ main, flyio-new-files ]
  pull_request:
    branches: [ main, flyio-new-files ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint . --ignore-pattern "vendor/" || true

      - name: Execute Automated Unit & Integration Tests
        run: npm test

      - name: Validate Production Rollup Build
        run: npm run build
